name: Weekly AI Trend Digest

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday 08:00 UTC
  workflow_dispatch: {}

jobs:
  trend-digest:
    name: Fetch & Digest AI Trends
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch AI trends
        id: fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import asyncio, json, sys, os
          sys.path.insert(0, ".")
          from agent.trend_watcher import TrendWatcher

          watcher = TrendWatcher()
          alerts = asyncio.run(watcher.fetch())
          relevant = [a for a in alerts if a.relevance_score >= 0.3]
          relevant.sort(key=lambda a: a.relevance_score, reverse=True)

          with open("/tmp/trends.json", "w") as f:
              json.dump([a.as_dict() for a in relevant[:25]], f, indent=2)

          print(f"Total alerts: {len(alerts)}, High-relevance: {len(relevant)}", file=sys.stderr)
          for a in relevant[:5]:
              print(f"  [{a.source}] {a.title} (score={a.relevance_score:.2f})", file=sys.stderr)
          PYEOF

      - name: Generate step summary
        run: |
          python3 << 'PYEOF'
          import json, os

          try:
              alerts = json.load(open("/tmp/trends.json"))
          except Exception:
              alerts = []

          lines = [
              "## Weekly AI Trend Digest",
              f"**Date:** {__import__('datetime').date.today()}  |  **Alerts:** {len(alerts)}",
              "",
          ]

          by_source = {}
          for a in alerts:
              by_source.setdefault(a["source"], []).append(a)

          for source, items in sorted(by_source.items()):
              lines.append(f"### {source.title()}")
              for a in items[:5]:
                  score = a.get("relevance_score", 0)
                  lines.append(f"- **[{score:.2f}]** [{a['title'][:80]}]({a['url']})")
                  if a.get("summary"):
                      lines.append(f"  > {a['summary'][:120]}")
              lines.append("")

          if not alerts:
              lines.append("_No high-relevance trends discovered this week._")

          summary = "\n".join(lines)
          step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(step_summary, "a") as f:
              f.write(summary + "\n")
          PYEOF

      - name: Create weekly digest issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let alerts = [];
            try {
              alerts = JSON.parse(fs.readFileSync('/tmp/trends.json', 'utf8'));
            } catch (e) {
              core.info('No trends file — skipping issue creation');
              return;
            }

            if (!alerts.length) {
              core.info('No relevant trends this week — skipping issue');
              return;
            }

            const date = new Date().toISOString().split('T')[0];
            const bySource = {};
            for (const a of alerts) {
              if (!bySource[a.source]) bySource[a.source] = [];
              bySource[a.source].push(a);
            }

            let body = `## Weekly AI Trend Digest — ${date}\n\n`;
            body += `**${alerts.length} high-relevance trend(s) detected this week.**\n\n`;

            for (const [source, items] of Object.entries(bySource)) {
              body += `### ${source.charAt(0).toUpperCase() + source.slice(1)}\n`;
              body += `| Score | Title | Published |\n|-------|-------|----------|\n`;
              for (const a of items.slice(0, 6)) {
                const title = a.title.length > 70 ? a.title.slice(0, 70) + '…' : a.title;
                body += `| ${a.relevance_score.toFixed(2)} | [${title}](${a.url}) | ${a.published} |\n`;
              }
              body += '\n';
            }

            body += `\n---\n`;
            body += `### Action Required\n`;
            body += `Review the items above and determine if any should become:\n`;
            body += `- A feature request (new model support, API compatibility)\n`;
            body += `- A dependency upgrade (new Ollama version)\n`;
            body += `- A research spike (arXiv technique to evaluate)\n\n`;
            body += `_Auto-generated by weekly-trend-digest.yml_`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Trend Digest] Week of ${date}`,
              body,
              labels: ['trend-digest', 'auto-detected'],
            });
            core.info(`Created trend digest issue for ${date}`);
