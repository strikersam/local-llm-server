name: OpenClaw Maintenance

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        run: |
          git clone https://github.com/getmoss/openclaw-claude-code openclaw
          cd openclaw && npm install
          node openclaw/index.js --version || node openclaw/bin/openclaw --version || echo "OpenClaw installed"
