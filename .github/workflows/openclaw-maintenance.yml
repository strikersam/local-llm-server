name: OpenClaw Maintenance

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -n "${GH_PAT}" ]; then
            git clone "https://x-access-token:${GH_PAT}@github.com/openclaw/openclaw" openclaw
          else
            git clone https://github.com/openclaw/openclaw openclaw
          fi
          cd openclaw && npm install
          node index.js --version || node bin/openclaw --version || echo "OpenClaw installed"
