name: Process Quick Note

# Triggered on schedule, manually, push of sentinel file, or by the self-retry mechanism.
on:
  schedule:
    - cron: '0 */4 * * *'
  push:
    branches: [master]
    paths: ['.github/workflows/.trigger-quick-note']
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process (blank = auto-pick oldest)"
        required: false
        type: string

concurrency:
  group: quick-note-processor
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

# ---------------------------------------------------------------------------
# Pipeline: find → fetch URL → branch → implement → test → PR → review → merge
# On any failure the issue is reopened (auto-retry up to 3×).
# After 3 failures the issue is labelled quick-note:exhausted and left open.
# ---------------------------------------------------------------------------
jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Find next pending issue ─────────────────────────────────────────
      - name: Find next pending quick-note issue
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER_OVERRIDE: ${{ github.event.inputs.issue_number }}
        run: |
          if [ -n "$ISSUE_NUMBER_OVERRIDE" ]; then
            NUM="$ISSUE_NUMBER_OVERRIDE"
            echo "Manual override — using issue #$NUM"
          else
            # Oldest open quick-note that has not exhausted retries
            NUM=$(gh issue list \
              --repo "${{ github.repository }}" \
              --state open \
              --search "quick-note: in:title -label:quick-note:exhausted" \
              --json number \
              --limit 100 \
              --jq 'sort_by(.number) | .[0].number // empty')
          fi
          if [ -z "$NUM" ]; then
            echo "No pending quick-note issues found — nothing to do."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "number=$NUM" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. Extract URL, task, and retry count ──────────────────────────────
      - name: Resolve issue body
        id: issue
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM="${{ steps.pick.outputs.number }}"
          BODY=$(gh issue view "$NUM" \
            --repo "${{ github.repository }}" --json body -q .body)

          # Extract first https:// URL from body
          URL=$(echo "$BODY" | grep -oE 'https?://[^[:space:]>)]+' | head -1)

          # Extract Task: line
          TASK=$(echo "$BODY" \
            | grep -iE "^[Tt]ask:" \
            | sed 's/^[Tt]ask:[[:space:]]*//' \
            | head -1)

          # Read retry count from labels (label format: retry:N)
          RETRY=$(gh issue view "$NUM" \
            --repo "${{ github.repository }}" \
            --json labels \
            -q '.labels[].name' \
            | grep -oE 'retry:[0-9]+' \
            | grep -oE '[0-9]+' \
            | head -1 || echo "0")
          [ -z "$RETRY" ] && RETRY=0

          echo "number=$NUM"       >> "$GITHUB_OUTPUT"
          echo "url=$URL"          >> "$GITHUB_OUTPUT"
          echo "task=$TASK"        >> "$GITHUB_OUTPUT"
          echo "retry=$RETRY"      >> "$GITHUB_OUTPUT"
          echo "Resolved #$NUM → URL=$URL task=$TASK retry=$RETRY"

      # ── 4. Comment "processing started" ───────────────────────────────────
      - name: Comment — processing started
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RETRY="${{ steps.issue.outputs.retry }}"
          if [ "$RETRY" -gt 0 ]; then
            MSG="🔄 Retry #${RETRY} — processing \`${{ steps.issue.outputs.url }}\`"
          else
            MSG="⏳ Processing started — fetching \`${{ steps.issue.outputs.url }}\`"
          fi
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" --body "$MSG"

      # ── 5. Python + Node setup ─────────────────────────────────────────────
      - uses: actions/setup-python@v5
        if: steps.pick.outputs.found == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        if: steps.pick.outputs.found == 'true'
        run: |
          pip install openai requests
          # Install required versions explicitly before full requirements to avoid system-package conflicts
          pip install "PyJWT>=2.12.0" "cryptography>=46.0.6" --ignore-installed --quiet
          pip install -r requirements.txt --quiet || pip install -r requirements.txt --no-deps --quiet || true

      # ── 6. Fetch URL content (multi-strategy) ─────────────────────────────
      - name: Fetch URL content
        id: fetch
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL="${{ steps.issue.outputs.url }}"
          if [ -z "$URL" ]; then
            gh issue comment "${{ steps.issue.outputs.number }}" \
              --repo "${{ github.repository }}" \
              --body "$(cat <<'MSG'
          ❌ No URL found in the issue body.

          Please include a full `https://` link and reopen the issue.
          If the share link requires a login, paste the article text directly into the issue body instead.
          MSG
          )"
            exit 1
          fi

          python3 .github/scripts/fetch_url.py "$URL" || true
          FETCH_EXIT=$?

          # Write stub for any fetch failure (exit 2 = all strategies exhausted,
          # exit 1 = unexpected error). Either way the agent proceeds on task only.
          if [ ! -f /tmp/note_content.txt ] || [ ! -s /tmp/note_content.txt ]; then
            printf 'Source URL: %s\n\n[URL content unavailable — fetch exited %s.]\nImplement features based on the task description and your knowledge of the topic at %s.\n' \
              "${URL}" "${FETCH_EXIT}" "${URL}" > /tmp/note_content.txt
            gh issue comment "${{ steps.issue.outputs.number }}" \
              --repo "${{ github.repository }}" \
              --body "⚠️ Could not fetch \`${URL}\` (fetch exit ${FETCH_EXIT}). Proceeding with task description only." \
              2>/dev/null || true
          fi

          CHARS=$(wc -c < /tmp/note_content.txt)
          echo "fetch_chars=$CHARS" >> "$GITHUB_OUTPUT"
          echo "Fetched $CHARS chars"

      # ── 7. Create feature branch ───────────────────────────────────────────
      - name: Create feature branch
        id: branch
        if: steps.pick.outputs.found == 'true' && steps.fetch.outputs.fetch_chars != ''
        run: |
          BRANCH="quick-note/issue-${{ steps.issue.outputs.number }}"
          git config user.email "claude-actions@github.com"
          git config user.name "Claude Actions [bot]"

          # Clean up any stale branch
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 8. Implement features with Claude ──────────────────────────────────
      - name: Implement features (Claude agentic loop)
        id: implement
        if: steps.branch.outputs.branch != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python3 .github/scripts/implement_agent.py \
            "${{ steps.issue.outputs.url }}" \
            "${{ steps.issue.outputs.number }}" \
            "${{ steps.issue.outputs.task }}" \
            2>&1 | tee /tmp/impl_output.txt

          if [ -f /tmp/impl_result.json ]; then
            SUCCESS=$(python3 -c "import json; d=json.load(open('/tmp/impl_result.json')); print(d['success'])")
            echo "success=$SUCCESS" >> "$GITHUB_OUTPUT"
          else
            echo "success=False" >> "$GITHUB_OUTPUT"
          fi

      # ── 9. Run test suite ──────────────────────────────────────────────────
      - name: Run pytest
        id: tests
        if: steps.implement.outputs.success == 'True'
        run: |
          if pytest -x -q --tb=short 2>&1 | tee /tmp/test_output.txt; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 10. Commit and push branch ─────────────────────────────────────────
      - name: Commit and push
        id: commit
        if: steps.implement.outputs.success == 'True'
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No file changes detected after implementation."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            SUMMARY=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('/tmp/impl_result.json'))
              print(d.get('summary','')[:200])
          except Exception:
              print('')
          " 2>/dev/null || echo "")
            git commit -m "feat(quick-note): implement issue #${{ steps.issue.outputs.number }}

          $SUMMARY"
            git push --force-with-lease -u origin "${{ steps.branch.outputs.branch }}" \
              || git push --force -u origin "${{ steps.branch.outputs.branch }}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 10b. Close as already done when no file changes were needed ─────────
      # Fires when the agent succeeded, tests passed, but nothing was staged.
      # This means the agent correctly determined the feature is already present.
      # Closing here prevents the retry handler from treating it as a failure.
      - name: Close issue — already implemented (no changes needed)
        id: close_no_changes
        if: >
          steps.tests.outputs.passed == 'true' &&
          steps.commit.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMPL_SUMMARY=$(python3 -c "
          import json
          try:
              d = json.load(open('/tmp/impl_result.json'))
              print(d.get('summary',''))
          except Exception:
              print('')
          " 2>/dev/null || echo "")

          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<MSG
          ✅ Done — no code changes needed.

          The agent reviewed the codebase and determined the requested features are already implemented.

          **Agent summary:** $IMPL_SUMMARY
          MSG
          )"
          gh issue close "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --reason completed

      # ── 11. Create pull request ────────────────────────────────────────────
      - name: Create pull request
        id: pr
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GH_TOKEN}" | gh auth login --with-token
          IMPL_SUMMARY=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('/tmp/impl_result.json'))
              print(d.get('summary','(see diff)'))
          except Exception:
              print('(see diff)')
          " 2>/dev/null || echo "(see diff)")

          PR_BODY="$(cat <<PRBODY
          ## Summary
          Closes #${{ steps.issue.outputs.number }}

          **Source URL:** ${{ steps.issue.outputs.url }}
          **Task:** ${{ steps.issue.outputs.task }}

          ### What was implemented
          $IMPL_SUMMARY

          ---
          *Auto-generated by the process-quick-note workflow.*
          PRBODY
          )"

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --title "feat: implement quick-note issue #${{ steps.issue.outputs.number }}" \
            --body "$PR_BODY" \
            --base master \
            --head "${{ steps.branch.outputs.branch }}" 2>&1) || {
            # gh pr create may fail if a PR already exists for this branch; recover it
            echo "WARN: gh pr create failed ($PR_URL) — checking for existing PR on branch"
            PR_URL=$(gh pr list \
              --repo "${{ github.repository }}" \
              --head "${{ steps.branch.outputs.branch }}" \
              --state open \
              --json url \
              --jq '.[0].url' 2>/dev/null || echo "")
          }

          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL"    >> "$GITHUB_OUTPUT"
          echo "PR result: #$PR_NUM — $PR_URL"

      # ── 11b. Wait for auto-review bots ────────────────────────────────────────
      # Give CodeRabbit / GitHub Copilot time to post their first-pass review.
      # 120 s is enough for most bots; the apply step handles the empty case.
      - name: Wait for review bots (CodeRabbit / Copilot)
        if: steps.pr.outputs.pr_number != ''
        run: sleep 120

      # ── 11c. Apply review comments (NVIDIA NIM) ────────────────────────────
      # Reads every review comment posted on the PR (CodeRabbit, Copilot, council)
      # and runs a NVIDIA NIM agentic loop to apply the suggested changes.
      - name: Apply review comments
        id: review_apply
        if: steps.pr.outputs.pr_number != ''
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 .github/scripts/apply_review.py \
            "${{ steps.pr.outputs.pr_number }}" \
            2>&1 | tee /tmp/review_apply_output.txt

          if [ -f /tmp/review_apply_result.json ]; then
            APPLIED=$(python3 -c "import json; d=json.load(open('/tmp/review_apply_result.json')); print(d.get('applied',False))")
            echo "applied=$APPLIED" >> "$GITHUB_OUTPUT"
          else
            echo "applied=False" >> "$GITHUB_OUTPUT"
          fi

      # ── 11d. Push review fixes ─────────────────────────────────────────────
      # Commits and force-pushes any edits the apply agent made.
      - name: Commit and push review fixes
        id: review_push
        if: steps.review_apply.outputs.applied == 'True'
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No staged changes after review application."
          else
            git commit -m "fix(quick-note): apply review feedback for issue #${{ steps.issue.outputs.number }}"
            git push --force-with-lease -u origin "${{ steps.branch.outputs.branch }}" \
              || git push --force -u origin "${{ steps.branch.outputs.branch }}"
            echo "Review fixes pushed to ${{ steps.branch.outputs.branch }}"
          fi

      # ── 12. Council review ─────────────────────────────────────────────────
      - name: Council review (Security / Correctness / Performance / Maintainability)
        id: review
        if: steps.pr.outputs.pr_number != ''
        # continue-on-error so a crash here never blocks merge or issue-close.
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/review_agent.py \
            "${{ steps.pr.outputs.pr_number }}" \
            2>&1 | tee /tmp/review_output.txt

          if [ -f /tmp/review_result.json ]; then
            VERDICT=$(python3 -c "import json; print(json.load(open('/tmp/review_result.json'))['verdict'])")
          else
            VERDICT="WARN"
          fi
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

          REVIEW_BODY=$(tail -60 /tmp/review_output.txt)
          gh pr comment "${{ steps.pr.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --body "## Council Review

          \`\`\`
          $REVIEW_BODY
          \`\`\`"

      # ── 13. Merge PR and delete branch ────────────────────────────────────
      # Squash-merges and deletes the feature branch on success.
      # --admin bypasses changelog CI check for auto-generated PRs.
      - name: Merge PR into master (squash + delete branch)
        id: merge
        if: >
          steps.pr.outputs.pr_number != '' &&
          (steps.review.outputs.verdict == 'PASS' ||
           steps.review.outputs.verdict == 'WARN'  ||
           steps.review.outputs.verdict == '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --admin \
            --subject "feat: implement quick-note issue #${{ steps.issue.outputs.number }}"
          echo "merged=true" >> "$GITHUB_OUTPUT"
          echo "Merged and deleted branch for PR #${{ steps.pr.outputs.pr_number }}"

      # ── 14. Close issue on success ─────────────────────────────────────────
      - name: Close issue — success
        id: close_success
        if: steps.merge.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMPL_SUMMARY=$(python3 -c "
          import json
          try:
              d = json.load(open('/tmp/impl_result.json'))
              print(d.get('summary',''))
          except Exception:
              print('')
          " 2>/dev/null || echo "")

          REVIEW_APPLIED="${{ steps.review_apply.outputs.applied }}"
          REVIEW_NOTE=""
          if [ "$REVIEW_APPLIED" = "True" ]; then
            REVIEW_NOTE=$'\n\n**Review feedback was applied by the NVIDIA NIM agent before merge.**'
          fi

          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<MSG
          ✅ Done — PR #${{ steps.pr.outputs.pr_number }} merged into master (branch deleted).

          ### What was implemented
          $IMPL_SUMMARY
          $REVIEW_NOTE
          **Council verdict:** ${{ steps.review.outputs.verdict }}
          MSG
          )"
          gh issue close "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --reason completed

      # ── 15. Leave PR open when council returns FAIL ────────────────────────
      - name: Comment — needs human review (council FAIL)
        if: >
          steps.pr.outputs.pr_number != '' &&
          steps.review.outputs.verdict == 'FAIL'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<MSG
          ⚠️ Council review returned **FAIL** — PR #${{ steps.pr.outputs.pr_number }} needs human review before merging.

          Please review and merge (or close) the PR manually.
          MSG
          )"

      # ── 15b. Alert when PR exists but merge failed ─────────────────────────
      - name: Comment — PR needs manual merge
        if: >
          always() &&
          steps.pr.outputs.pr_number != '' &&
          steps.merge.outcome != 'success' &&
          steps.review.outputs.verdict != 'FAIL'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "$(cat <<MSG
          ⚠️ PR #${{ steps.pr.outputs.pr_number }} created (council: **${{ steps.review.outputs.verdict }}**) but auto-merge failed.

          Please merge PR #${{ steps.pr.outputs.pr_number }} manually to close this issue.
          MSG
          )" 2>/dev/null || true

      # ── 16. Auto-retry: reopen issue on failure ────────────────────────────
      # Runs whenever the issue was found but was NOT successfully closed.
      #
      # Previous behaviour used failure() which only fires on non-zero step
      # exits.  This missed two silent-skip cases that kept issues open forever:
      #
      #   a) Tests fail after implementation — step 9 exits 0 (if/else), so
      #      subsequent steps are skipped via their `if:` conditions, not via a
      #      step failure.  failure() == false → retry handler never ran.
      #
      #   b) Agent succeeds but makes no file changes (nothing to commit) —
      #      same pattern: step 10 exits 0 with changed=false, no PR is created,
      #      no failure(), retry handler never ran.
      #
      # Fix: use always() + check that the issue was neither closed (close_success
      # not successful) nor handed to a human (verdict == 'FAIL').  The additional
      # guard `(failure() || steps.pr.outputs.pr_number == '')` ensures we don't
      # spuriously retry when the pipeline completed normally but the close step
      # had a transient hiccup — in that case pr_number is set and no failure
      # occurred.
      - name: Handle failure — reopen for retry
        if: >
          always() &&
          steps.pick.outputs.found == 'true' &&
          steps.close_success.outcome != 'success' &&
          steps.close_no_changes.outcome != 'success' &&
          steps.review.outputs.verdict != 'FAIL' &&
          steps.pr.outputs.pr_number == '' &&
          (failure() || steps.implement.outputs.success != 'True')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RETRY="${{ steps.issue.outputs.retry }}"
          NEW_RETRY=$((RETRY + 1))
          MAX_RETRIES=3
          ISSUE="${{ steps.issue.outputs.number }}"

          # Remove old retry label (best-effort)
          gh issue edit "$ISSUE" \
            --repo "${{ github.repository }}" \
            --remove-label "retry:${RETRY}" 2>/dev/null || true

          if [ "$NEW_RETRY" -ge "$MAX_RETRIES" ]; then
            # Exhausted — label and leave open for human
            gh label create "quick-note:exhausted" \
              --repo "${{ github.repository }}" \
              --color "b60205" --description "Retries exhausted" 2>/dev/null || true
            gh issue edit "$ISSUE" \
              --repo "${{ github.repository }}" \
              --add-label "quick-note:exhausted" 2>/dev/null || true
            gh issue comment "$ISSUE" \
              --repo "${{ github.repository }}" \
              --body "$(cat <<MSG
          ❌ Failed after ${MAX_RETRIES} attempts — manual intervention required.

          **Failure log (last 40 lines of agent output):**
          \`\`\`
          $(tail -40 /tmp/impl_output.txt 2>/dev/null || tail -40 /tmp/test_output.txt 2>/dev/null || echo "(no log)")
          \`\`\`
          MSG
          )"
          else
            # Create retry label if it doesn't exist
            gh label create "retry:${NEW_RETRY}" \
              --repo "${{ github.repository }}" \
              --color "e4e669" \
              --description "Auto-retry attempt ${NEW_RETRY}" 2>/dev/null || true
            gh issue edit "$ISSUE" \
              --repo "${{ github.repository }}" \
              --add-label "retry:${NEW_RETRY}" 2>/dev/null || true
            gh issue reopen "$ISSUE" \
              --repo "${{ github.repository }}" 2>/dev/null || true
            gh issue comment "$ISSUE" \
              --repo "${{ github.repository }}" \
              --body "$(cat <<MSG
          ⚠️ Attempt ${RETRY} failed — reopening for automatic retry (${NEW_RETRY}/${MAX_RETRIES}).

          The next scheduled run (every 4 h) will pick this up automatically.
          To trigger immediately: re-run the *Process Quick Note* workflow with issue number \`${ISSUE}\`.

          **What failed:**
          \`\`\`
          $(tail -20 /tmp/impl_output.txt 2>/dev/null || tail -20 /tmp/test_output.txt 2>/dev/null || echo "(no log available)")
          \`\`\`
          MSG
          )"
          fi
