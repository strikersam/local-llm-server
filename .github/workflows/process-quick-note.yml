name: Process Quick Note

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string

concurrency:
  group: quick-note-processor
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' &&
       startsWith(github.event.issue.title, 'quick-note:')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve issue number and URL
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NUM="${{ github.event.inputs.issue_number }}"
          else
            NUM="${{ github.event.issue.number }}"
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          BODY=$(gh issue view "$NUM" --repo "${{ github.repository }}" --json body -q .body)
          URL=$(echo "$BODY" | grep -oE 'https?://[^[:space:]]+' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Resolved issue #$NUM → $URL"

      - name: Comment processing started
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "⏳ Processing started — fetching ${{ steps.issue.outputs.url }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Fetch URL content
        run: |
          URL="${{ steps.issue.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "ERROR: no URL found in issue body" >&2
            exit 1
          fi
          curl -sL --max-time 30 --user-agent "Mozilla/5.0" "$URL" | head -c 12000 > /tmp/note_content.txt
          echo "Fetched $(wc -c < /tmp/note_content.txt) bytes from $URL"

      - name: Run LLM via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install openai -q
          python3 << 'PYEOF'
          import os, subprocess, sys, re
          from openai import OpenAI

          url = "${{ steps.issue.outputs.url }}"
          issue_num = "${{ steps.issue.outputs.number }}"

          page_content = open("/tmp/note_content.txt").read()

          result = subprocess.run(
              ["git", "ls-files", "--", "*.py", "*.js", "*.ts", "*.tsx", "*.yml", "*.yaml", "*.md"],
              capture_output=True, text=True
          )
          file_tree = result.stdout[:3000]

          prompt = f"""You are implementing a coding task queued by the repository owner via an iPhone shortcut.
Issue #{issue_num} — URL: {url}

Repository files (partial):
{file_tree}

Fetched page content from the URL:
---
{page_content[:8000]}
---

Your task:
1. Analyse the page content and determine what feature/change should be implemented in this repo.
2. Output the implementation as a series of file writes using this exact format for each file:

=== FILE: path/to/file.ext ===
<complete file contents>
=== END FILE ===

3. After all files, add a short entry to docs/changelog.md under [Unreleased].
4. Be focused — only implement what is clearly described. Don't invent new features.
5. If nothing actionable is found, output: NOTHING_TO_IMPLEMENT"""

          client = OpenAI(
              base_url="https://models.inference.ai.azure.com",
              api_key=os.environ["GITHUB_TOKEN"],
          )
          print("Calling GitHub Models (Llama 3.3 70B)...")
          message = client.chat.completions.create(
              model="Meta-Llama-3.3-70B-Instruct",
              max_tokens=8192,
              messages=[{"role": "user", "content": prompt}]
          )
          response = message.choices[0].message.content
          print("Response length:", len(response))

          if "NOTHING_TO_IMPLEMENT" in response:
              print("Claude found nothing actionable to implement.")
              sys.exit(0)

          # Parse and apply file blocks
          import re
          pattern = r"=== FILE: (.+?) ===\n(.*?)=== END FILE ==="
          matches = re.findall(pattern, response, re.DOTALL)
          if not matches:
              print("No FILE blocks found in response. Raw output:")
              print(response[:2000])
              sys.exit(0)

          for filepath, contents in matches:
              filepath = filepath.strip()
              os.makedirs(os.path.dirname(filepath) if os.path.dirname(filepath) else ".", exist_ok=True)
              with open(filepath, "w") as f:
                  f.write(contents)
              print(f"Wrote: {filepath}")

          print("Done applying changes.")
          PYEOF

      - name: Commit and push
        id: commit
        run: |
          git config user.email "claude-actions@github.com"
          git config user.name "Claude Actions [bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat: implement quick-note from issue #${{ steps.issue.outputs.number }}"
            git push origin master
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
            MSG="✅ Done — changes committed and pushed to master."
          else
            MSG="✅ Done — Claude ran but made no file changes."
          fi
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "$MSG"
          gh issue close "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --reason completed
