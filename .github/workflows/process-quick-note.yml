name: Process Quick Note

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string

concurrency:
  group: quick-note-processor
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' &&
       startsWith(github.event.issue.title, 'quick-note:')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve issue number and URL
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NUM="${{ github.event.inputs.issue_number }}"
          else
            NUM="${{ github.event.issue.number }}"
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          BODY=$(gh issue view "$NUM" --repo "${{ github.repository }}" --json body -q .body)
          URL=$(echo "$BODY" | grep -oE 'https?://[^[:space:]]+' | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Resolved issue #$NUM → $URL"

      - name: Comment processing started
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "⏳ Processing started — fetching ${{ steps.issue.outputs.url }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Fetch URL content
        run: |
          URL="${{ steps.issue.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "ERROR: no URL found in issue body" >&2
            exit 1
          fi
          curl -sL --max-time 30 --user-agent "Mozilla/5.0" "$URL" | head -c 12000 > /tmp/note_content.txt
          echo "Fetched $(wc -c < /tmp/note_content.txt) bytes from $URL"

      - name: Build prompt
        run: |
          URL="${{ steps.issue.outputs.url }}"
          ISSUE="${{ steps.issue.outputs.number }}"
          {
            echo "You are implementing a task queued from a GitHub issue. Issue #${ISSUE}."
            echo ""
            echo "The user shared this URL: ${URL}"
            echo ""
            echo "Fetched page content:"
            echo "---"
            cat /tmp/note_content.txt
            echo ""
            echo "---"
            echo ""
            echo "Analyse what needs to be implemented or changed in this repository."
            echo "Implement the changes. Keep scope focused on what is clearly described."
            echo "Update docs/changelog.md under [Unreleased] with a brief entry."
            echo "Do not ask for clarification — make your best judgement and implement."
          } > /tmp/prompt.txt
          echo "Prompt size: $(wc -c < /tmp/prompt.txt) bytes"

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CONFIG_DIR: /tmp/claude-config
        run: |
          mkdir -p /tmp/claude-config
          echo "API key length: ${#ANTHROPIC_API_KEY}"
          claude --version
          claude --print --dangerously-skip-permissions "$(cat /tmp/prompt.txt)" 2>&1
          echo "Exit code: $?"

      - name: Commit and push
        id: commit
        run: |
          git config user.email "claude-actions@github.com"
          git config user.name "Claude Actions [bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat: implement quick-note from issue #${{ steps.issue.outputs.number }}"
            git push origin master
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
            MSG="✅ Done — changes committed and pushed to master."
          else
            MSG="✅ Done — Claude ran but made no file changes."
          fi
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "$MSG"
          gh issue close "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --reason completed
