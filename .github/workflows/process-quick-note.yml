name: Process Quick Note

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process (leave blank to auto-pick oldest)"
        required: false
        type: string

concurrency:
  group: quick-note-processor
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Find next pending quick-note issue
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.issue_number }}" ]; then
            NUM="${{ github.event.inputs.issue_number }}"
            echo "Manual override — using issue #$NUM"
          else
            NUM=$(gh issue list \
              --repo "${{ github.repository }}" \
              --state open \
              --search "quick-note: in:title" \
              --json number \
              --limit 100 \
              --jq 'sort_by(.number) | .[0].number // empty')
          fi
          if [ -z "$NUM" ]; then
            echo "No pending quick-note issues found — nothing to do."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "number=$NUM" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve issue body and extract URL / task
        id: issue
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM="${{ steps.pick.outputs.number }}"
          BODY=$(gh issue view "$NUM" --repo "${{ github.repository }}" --json body -q .body)
          URL=$(echo "$BODY" | grep -oE 'https?://[^[:space:]]+' | head -1)
          TASK=$(echo "$BODY" | grep -i "^Task:" | sed 's/^[Tt]ask:[[:space:]]*//')
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "task=$TASK" >> "$GITHUB_OUTPUT"
          echo "Resolved issue #$NUM → $URL | task: $TASK"

      - name: Comment processing started
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "⏳ Processing started — fetching ${{ steps.issue.outputs.url }}"

      - uses: actions/setup-python@v5
        if: steps.pick.outputs.found == 'true'
        with:
          python-version: "3.12"

      - name: Install OpenAI SDK
        if: steps.pick.outputs.found == 'true'
        run: pip install openai

      - name: Fetch URL content
        if: steps.pick.outputs.found == 'true'
        run: |
          URL="${{ steps.issue.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "ERROR: no URL found in issue body" >&2
            exit 1
          fi
          # Fetch and strip HTML tags → plain text is 4x more token-efficient
          curl -sL --max-time 30 --user-agent "Mozilla/5.0" "$URL" \
            | sed 's/<[^>]*>/ /g' \
            | tr -s ' \t' ' ' \
            | grep -v '^\s*$' \
            | head -c 5000 > /tmp/note_content.txt
          echo "Extracted $(wc -c < /tmp/note_content.txt) chars of plain text from $URL"

      - name: Write LLM script
        if: steps.pick.outputs.found == 'true'
        run: |
          cat > /tmp/run_llm.py << 'PYEOF'
          import os, subprocess, sys, re
          from openai import OpenAI

          url = sys.argv[1]
          issue_num = sys.argv[2]
          task = sys.argv[3] if len(sys.argv) > 3 else ""

          page_content = open("/tmp/note_content.txt").read()

          result = subprocess.run(
              ["git", "ls-files", "--", "*.py", "*.js", "*.ts", "*.tsx", "*.yml", "*.yaml", "*.md"],
              capture_output=True, text=True
          )
          file_tree = result.stdout[:1500]

          task_line = f"User instruction: {task}\n\n" if task else ""

          prompt = (
              "You are implementing a coding task queued by the repository owner via an iPhone shortcut.\n"
              f"Issue #{issue_num} -- URL: {url}\n\n"
              + task_line
              + "Repository files (partial):\n"
              + file_tree + "\n\n"
              "Fetched page content from the URL:\n---\n"
              + page_content[:4000] + "\n---\n\n"
              "Your task:\n"
              "1. Follow the user instruction above. Use the URL content as reference.\n"
              "   If no instruction given, infer what to implement from the URL content.\n"
              "2. Output EVERY file change using this EXACT format (no other format accepted):\n\n"
              "=== FILE: path/to/file.ext ===\n"
              "<complete file contents here>\n"
              "=== END FILE ===\n\n"
              "3. Add a short entry to docs/changelog.md under [Unreleased].\n"
              "4. Be focused -- only implement what is clearly described.\n"
              "5. If nothing actionable, output only: NOTHING_TO_IMPLEMENT"
          )

          # Auto-select free NVIDIA NIM model by task complexity.
          # Tiers mirror router/classifier.py categories so routing is consistent
          # with the proxy's own model-selection logic.
          REASONING_KEYWORDS = [
              "architect", "design", "plan", "strategy", "system", "security", "auth",
              "performance", "scalab", "tradeoff", "compare", "evaluate", "migration",
              "pipeline", "multi", "integrate", "orchestrat", "infrastructure",
          ]
          CODE_KEYWORDS = [
              "implement", "build", "create", "add", "refactor", "endpoint",
              "api", "handler", "module", "feature", "cloud", "vercel", "deploy",
              "async", "agent", "function", "class", "route", "scaffold",
          ]
          ANALYSIS_KEYWORDS = [
              "math", "calculat", "proof", "algorithm", "data analysis",
              "machine learning", "deep learning", "neural", "dataset", "ml",
          ]

          task_lower = (task + " " + url).lower()

          if any(kw in task_lower for kw in REASONING_KEYWORDS) or len(task) > 120:
              model = "nvidia/llama-3.1-nemotron-ultra-253b-v1"
              tier = "reasoning/planning (Nemotron Ultra 253B)"
          elif any(kw in task_lower for kw in ANALYSIS_KEYWORDS):
              model = "deepseek-ai/deepseek-r1"
              tier = "data analysis/math (DeepSeek R1)"
          elif any(kw in task_lower for kw in CODE_KEYWORDS) or len(task) > 40:
              model = "qwen/qwen2.5-coder-32b-instruct"
              tier = "code generation (Qwen2.5 Coder 32B)"
          else:
              model = "meta/llama-3.1-8b-instruct"
              tier = "fast response (Llama 3.1 8B)"

          nvidia_key = os.environ.get("NVIDIA_API_KEY", "")
          if not nvidia_key:
              print("ERROR: NVIDIA_API_KEY secret not set — cannot call NVIDIA NIM API")
              sys.exit(1)

          print(f"Task tier: {tier}")
          print(f"Selected model: {model}")
          client = OpenAI(
              base_url="https://integrate.api.nvidia.com/v1",
              api_key=nvidia_key,
          )
          msg = client.chat.completions.create(
              model=model,
              max_tokens=8192,
              messages=[{"role": "user", "content": prompt}],
          )
          response = msg.choices[0].message.content

          print(f"Response length: {len(response)} chars")
          print("--- LLM RESPONSE START ---")
          print(response[:3000])
          print("--- LLM RESPONSE END ---")

          if "NOTHING_TO_IMPLEMENT" in response:
              print("Nothing actionable to implement.")
              sys.exit(0)

          pattern = r"=== FILE: (.+?) ===\n(.*?)=== END FILE ==="
          matches = re.findall(pattern, response, re.DOTALL)
          if not matches:
              pattern2 = r"```[^\n]*\n(?:#|//|--)\s*([^\n]+)\n(.*?)```"
              matches = re.findall(pattern2, response, re.DOTALL)
          if not matches:
              print("No file blocks found — writing response to /tmp/llm_response.txt")
              with open("/tmp/llm_response.txt", "w") as f:
                  f.write(response)
              sys.exit(0)

          for filepath, contents in matches:
              filepath = filepath.strip()
              os.makedirs(os.path.dirname(filepath) if os.path.dirname(filepath) else ".", exist_ok=True)
              with open(filepath, "w") as f:
                  f.write(contents)
              print(f"Wrote: {filepath}")

          print("Done applying changes.")
          PYEOF

      - name: Run LLM (auto-select free NVIDIA NIM model by complexity)
        id: llm
        if: steps.pick.outputs.found == 'true'
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python3 /tmp/run_llm.py "${{ steps.issue.outputs.url }}" "${{ steps.issue.outputs.number }}" "${{ steps.issue.outputs.task }}" 2>&1 | tee /tmp/llm_output.txt

      - name: Commit and push
        id: commit
        if: steps.pick.outputs.found == 'true'
        run: |
          git config user.email "claude-actions@github.com"
          git config user.name "Claude Actions [bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat: implement quick-note from issue #${{ steps.issue.outputs.number }}"
            git push -u origin master
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close issue
        if: steps.pick.outputs.found == 'true' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
            echo "✅ Done — changes committed and pushed to master." > /tmp/issue_msg.txt
          elif [ -f /tmp/llm_output.txt ] && grep -q "Error\|Exception\|Traceback" /tmp/llm_output.txt; then
            echo "❌ LLM step failed:" > /tmp/issue_msg.txt
            tail -20 /tmp/llm_output.txt >> /tmp/issue_msg.txt
          elif [ -f /tmp/llm_response.txt ]; then
            echo "⚠️ LLM ran but produced no parseable file changes. Raw response (first 1500 chars):" > /tmp/issue_msg.txt
            head -c 1500 /tmp/llm_response.txt >> /tmp/issue_msg.txt
          else
            echo "✅ Done — LLM ran but made no file changes." > /tmp/issue_msg.txt
          fi
          MSG=$(cat /tmp/issue_msg.txt)
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "$MSG"
          gh issue close "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --reason completed
