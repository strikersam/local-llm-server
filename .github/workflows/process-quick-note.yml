name: Process Quick Note

on:
  issues:
    types: [opened, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string

concurrency:
  group: quick-note-processor
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' &&
       startsWith(github.event.issue.title, 'quick-note:')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve issue number and URL
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NUM="${{ github.event.inputs.issue_number }}"
          else
            NUM="${{ github.event.issue.number }}"
          fi
          echo "number=$NUM" >> "$GITHUB_OUTPUT"
          BODY=$(gh issue view "$NUM" --repo "${{ github.repository }}" --json body -q .body)
          URL=$(echo "$BODY" | grep -oE 'https?://[^[:space:]]+' | head -1)
          TASK=$(echo "$BODY" | grep -i "^Task:" | sed 's/^[Tt]ask:[[:space:]]*//')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "task=$TASK" >> "$GITHUB_OUTPUT"
          echo "Resolved issue #$NUM → $URL | task: $TASK"

      - name: Comment processing started
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "⏳ Processing started — fetching ${{ steps.issue.outputs.url }}"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Fetch URL content
        run: |
          URL="${{ steps.issue.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "ERROR: no URL found in issue body" >&2
            exit 1
          fi
          curl -sL --max-time 30 --user-agent "Mozilla/5.0" "$URL" | head -c 12000 > /tmp/note_content.txt
          echo "Fetched $(wc -c < /tmp/note_content.txt) bytes from $URL"

      - name: Write LLM script
        run: |
          cat > /tmp/run_llm.py << 'PYEOF'
          import os, subprocess, sys, re
          from openai import OpenAI

          url = sys.argv[1]
          issue_num = sys.argv[2]
          task = sys.argv[3] if len(sys.argv) > 3 else ""

          page_content = open("/tmp/note_content.txt").read()

          result = subprocess.run(
              ["git", "ls-files", "--", "*.py", "*.js", "*.ts", "*.tsx", "*.yml", "*.yaml", "*.md"],
              capture_output=True, text=True
          )
          file_tree = result.stdout[:3000]

          task_line = f"User instruction: {task}\n\n" if task else ""

          prompt = (
              "You are implementing a coding task queued by the repository owner via an iPhone shortcut.\n"
              f"Issue #{issue_num} -- URL: {url}\n\n"
              + task_line
              + "Repository files (partial):\n"
              + file_tree + "\n\n"
              "Fetched page content from the URL:\n---\n"
              + page_content[:8000] + "\n---\n\n"
              "Your task:\n"
              "1. Follow the user instruction above. Use the URL content as reference.\n"
              "   If no instruction given, infer what to implement from the URL content.\n"
              "2. Output file changes using this exact format for each file:\n\n"
              "=== FILE: path/to/file.ext ===\n"
              "<complete file contents>\n"
              "=== END FILE ===\n\n"
              "3. Add a short entry to docs/changelog.md under [Unreleased].\n"
              "4. Be focused -- only implement what is clearly described.\n"
              "5. If nothing actionable, output: NOTHING_TO_IMPLEMENT"
          )

          client = OpenAI(
              base_url="https://api.groq.com/openai/v1",
              api_key=os.environ["GROQ_API_KEY"],
          )
          print("Calling Groq (Llama 3.3 70B)...")
          message = client.chat.completions.create(
              model="llama-3.3-70b-versatile",
              max_tokens=8192,
              messages=[{"role": "user", "content": prompt}]
          )
          response = message.choices[0].message.content
          print("Response length:", len(response))

          if "NOTHING_TO_IMPLEMENT" in response:
              print("Nothing actionable to implement.")
              sys.exit(0)

          pattern = r"=== FILE: (.+?) ===\n(.*?)=== END FILE ==="
          matches = re.findall(pattern, response, re.DOTALL)
          if not matches:
              print("No FILE blocks found. Raw output:")
              print(response[:2000])
              sys.exit(0)

          for filepath, contents in matches:
              filepath = filepath.strip()
              os.makedirs(os.path.dirname(filepath) if os.path.dirname(filepath) else ".", exist_ok=True)
              with open(filepath, "w") as f:
                  f.write(contents)
              print(f"Wrote: {filepath}")

          print("Done applying changes.")
          PYEOF

      - name: Run LLM via Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          pip install openai -q
          python3 /tmp/run_llm.py "${{ steps.issue.outputs.url }}" "${{ steps.issue.outputs.number }}" "${{ steps.issue.outputs.task }}"

      - name: Commit and push
        id: commit
        run: |
          git config user.email "claude-actions@github.com"
          git config user.name "Claude Actions [bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat: implement quick-note from issue #${{ steps.issue.outputs.number }}"
            git push origin master
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
            MSG="✅ Done — changes committed and pushed to master."
          else
            MSG="✅ Done — Claude ran but made no file changes."
          fi
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --body "$MSG"
          gh issue close "${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --reason completed
