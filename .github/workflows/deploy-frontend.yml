name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'webui/frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: webui/frontend/package-lock.json

      - name: Install dependencies
        working-directory: webui/frontend
        run: npm ci

      - name: Build
        working-directory: webui/frontend
        env:
          # Set this secret in GitHub → Settings → Secrets and variables → Actions
          # Value: your Render service URL, e.g. https://local-llm-server.onrender.com
          # Leave empty to use relative paths (only works when served by the proxy itself)
          VITE_API_BASE: ${{ secrets.RENDER_BACKEND_URL }}
          VITE_APP_BASE: /local-llm-server
        run: npm run build

      - name: Add 404 → SPA redirect
        run: cp webui/frontend/dist/index.html webui/frontend/dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webui/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
