name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'remote-admin/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
          PUBLIC_URL: /local-llm-server
        run: npm run build

      - name: Add 404 → SPA redirect
        run: cp frontend/build/index.html frontend/build/404.html

      - name: Copy remote-admin into build
        run: cp -r remote-admin frontend/build/remote-admin

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
