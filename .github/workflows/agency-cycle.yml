name: Agency Cycle

# Runs the agency assessment via Claude Code.
# Reads the improvement loop state, issues directives to specialist agents,
# and pushes any code fixes directly to master.

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      directive:
        description: 'Optional specific directive for the CEO'
        required: false
        default: ''

jobs:
  ceo-assess-and-dispatch:
    name: CEO Assessment & Agent Dispatch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt 2>&1 | tail -5

      - name: Configure git identity
        run: |
          git config user.email "agency-bot@local-llm-server"
          git config user.name "Agency Bot"

      - name: Run pytest baseline
        id: baseline
        run: |
          python -m pytest --tb=no -q --no-header 2>&1 | tee /tmp/test_baseline.txt || true
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=${EXIT}" >> "$GITHUB_OUTPUT"
          FAILING=$(grep '^FAILED ' /tmp/test_baseline.txt | awk '{print $2}' | head -5 | tr '\n' ',' | sed 's/,$//')
          echo "failing=${FAILING}" >> "$GITHUB_OUTPUT"

      - name: Scan for security issues (bandit)
        id: security
        run: |
          pip install bandit safety 2>&1 | tail -2
          bandit -r . \
            --exclude ".git,.venv,venv,node_modules,tests,frontend,remote-admin" \
            --format json --output /tmp/bandit.json -ll 2>/dev/null || true
          COUNT=$(python3 -c "import json; d=json.load(open('/tmp/bandit.json')); print(len(d.get('results',[])))" 2>/dev/null || echo 0)
          echo "findings=${COUNT}" >> "$GITHUB_OUTPUT"

      - name: CEO Assessment
        id: ceo
        run: |
          python3 - <<'PYEOF'
          import json, os

          failing = os.environ.get("FAILING_TESTS", "")
          sec_count = int(os.environ.get("SEC_COUNT", "0"))
          test_ok = os.environ.get("TEST_OK", "1") == "1"

          issues = []
          priority = []

          if failing:
            tests = [t for t in failing.split(",") if t]
            issues.append(f"❌ {len(tests)} failing test(s): {', '.join(tests[:3])}")
            priority.append("FIX_TESTS")

          if sec_count > 0:
            issues.append(f"🔒 {sec_count} security finding(s) from bandit")
            priority.append("FIX_SECURITY")

          if not issues:
            issues.append("✅ All systems nominal")

          assessment = {
            "issues": issues,
            "priority": priority,
            "test_pass": test_ok,
            "security_count": sec_count,
          }

          print(json.dumps(assessment, indent=2))
          with open("/tmp/assessment.json", "w") as f:
            json.dump(assessment, f)
          PYEOF
        env:
          FAILING_TESTS: ${{ steps.baseline.outputs.failing }}
          SEC_COUNT: ${{ steps.security.outputs.findings }}
          TEST_OK: ${{ steps.baseline.outputs.exit_code == '0' && '1' || '0' }}

      - name: Dispatch Dev Agent — Fix tests
        if: steps.baseline.outputs.exit_code != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          FAILING: ${{ steps.baseline.outputs.failing }}
        run: |
          cat > /tmp/dev_instruction.txt <<EOF
          You are the Dev Agent in the local-llm-server agency.

          The following tests are currently failing:
          $(echo "$FAILING" | tr ',' '\n' | sed 's/^/  - /')

          Run \`python -m pytest --tb=short -x\` to see the failures.
          Fix each failing test by correcting the implementation (never skip or mock tests).
          After fixing, run pytest again to confirm green.
          Update docs/changelog.md under [Unreleased] ### Fixed.
          Commit all changes with message: \`fix: resolve failing tests from agency cycle\`
          EOF

          if command -v claude &>/dev/null; then
            claude --print --dangerously-skip-permissions "$(cat /tmp/dev_instruction.txt)" || true
          else
            echo "Claude CLI not available — skipping automated fix"
          fi

      - name: Run tests after fix attempt
        if: steps.baseline.outputs.exit_code != '0'
        id: post_fix
        run: |
          python -m pytest --tb=no -q --no-header 2>&1 | tee /tmp/test_post.txt || true
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Commit & push fixes
        if: steps.baseline.outputs.exit_code != '0'
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: automated agency fix — failing tests"
            git push origin master
            echo "Pushed fixes to master"
          fi

      - name: Publish agency cycle summary
        run: |
          ASSESSMENT=$(python3 -c "import json; d=json.load(open('/tmp/assessment.json')); [print('-', i) for i in d['issues']]" 2>/dev/null || echo "Assessment unavailable")
          {
            echo "### Agency Cycle Results — $(date -u '+%Y-%m-%d %H:%M') UTC"
            echo ""
            echo "**CEO Assessment:**"
            echo "$ASSESSMENT"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            TEST_ICON=$([[ "${{ steps.baseline.outputs.exit_code }}" == "0" ]] && echo "✅" || echo "❌")
            echo "| Tests | ${TEST_ICON} |"
            echo "| Security findings | ${{ steps.security.outputs.findings }} |"
            if [ "${{ steps.baseline.outputs.exit_code }}" != "0" ]; then
              POST_ICON=$([[ "${{ steps.post_fix.outputs.exit_code }}" == "0" ]] && echo "✅ Fixed" || echo "⚠️ Still failing")
              echo "| Post-fix tests | ${POST_ICON} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create issue if agency cannot fix
        if: steps.baseline.outputs.exit_code != '0' && steps.post_fix.outputs.exit_code != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const baseline = fs.readFileSync('/tmp/test_baseline.txt', 'utf8');
            const postFix = fs.existsSync('/tmp/test_post.txt')
              ? fs.readFileSync('/tmp/test_post.txt', 'utf8') : 'No post-fix output';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'auto-detected,bug', state: 'open', per_page: 5,
            });
            if (issues.some(i => i.title.includes('Agency: Cannot Fix Tests'))) return;

            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Agency: Cannot Fix Tests — ${new Date().toISOString().split('T')[0]}`,
              body: [
                '## Agency Escalation: Tests remain failing after automated fix attempt',
                '',
                '**Baseline failures:**',
                `\`\`\`\n${baseline.slice(0, 2000)}\n\`\`\``,
                '',
                '**Post-fix run:**',
                `\`\`\`\n${postFix.slice(0, 2000)}\n\`\`\``,
                '',
                '_Human review required. The Dev Agent could not resolve these automatically._',
              ].join('\n'),
              labels: ['bug', 'auto-detected', 'agency-escalation'],
            });
