name: Fix Security Alerts (NIM Agent)

# Fires immediately when a new CodeQL or Dependabot alert appears,
# and also every 6 h as a sweep for anything missed.
on:
  # ── Real-time: new CodeQL alert detected in any branch ──────────────────
  code_scanning_alert:
    types: [appeared_in_branch]

  # ── Real-time: new Dependabot vulnerability alert ────────────────────────
  # Fires when Dependabot finds a new vulnerability in a dependency.
  # The dependabot-auto-merge workflow handles the resulting PR;
  # this trigger is a belt-and-suspenders to ensure nothing slips through.
  dependabot_alert:
    types: [created, reintroduced]

  # ── Periodic sweep — catches anything the event missed ───────────────────
  schedule:
    - cron: '0 */6 * * *'

  # ── Manual override ───────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      alert_number:
        description: "CodeQL alert number to fix (blank = auto-pick oldest open)"
        required: false
        type: string

  # ── Sentinel push trigger ─────────────────────────────────────────────────
  push:
    branches: [master]
    paths: ['.github/workflows/.trigger-security-fix']

concurrency:
  group: security-fix-processor
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Pick alert — from event payload or API fallback ────────────────
      - name: Find alert to fix
        id: pick
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          NUM=""

          # Priority 1: manual dispatch override
          if [ -n "${{ github.event.inputs.alert_number }}" ]; then
            NUM="${{ github.event.inputs.alert_number }}"
            echo "Source: manual override — alert #$NUM"

          # Priority 2: code_scanning_alert event carries the alert number directly
          elif [ "$EVENT_NAME" = "code_scanning_alert" ]; then
            NUM="${{ github.event.alert.number }}"
            echo "Source: code_scanning_alert event — alert #$NUM"

          # Priority 3: dependabot_alert event — convert to a code-scanning fix task
          # The Dependabot PR auto-merge flow already handles the dep upgrade;
          # here we record which package is affected for awareness / logging.
          elif [ "$EVENT_NAME" = "dependabot_alert" ]; then
            PKG="${{ github.event.alert.dependency.package.name }}"
            echo "Source: dependabot_alert — package $PKG (PR auto-merge flow will handle upgrade)"
            # Fall through to code-scanning sweep below so we also fix any
            # related code-scanning issues while the runner is already up.
            NUM=$(gh api \
              "/repos/${{ github.repository }}/code-scanning/alerts?state=open&sort=created&direction=asc&per_page=1" \
              --jq '.[0].number // empty' 2>/dev/null || echo "")

          # Priority 4: scheduled sweep / sentinel push — pick oldest open alert
          else
            NUM=$(gh api \
              "/repos/${{ github.repository }}/code-scanning/alerts?state=open&sort=created&direction=asc&per_page=1" \
              --jq '.[0].number // empty' 2>/dev/null || echo "")
            [ -n "$NUM" ] && echo "Source: scheduled sweep — alert #$NUM"
          fi

          if [ -z "$NUM" ]; then
            echo "No open code-scanning alerts — nothing to do."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true"  >> "$GITHUB_OUTPUT"
            echo "number=$NUM" >> "$GITHUB_OUTPUT"
            echo "Picked alert #$NUM"
          fi

      # ── 3. Fetch alert details ─────────────────────────────────────────────
      - name: Get alert details
        id: alert
        if: steps.pick.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERT=$(gh api "/repos/${{ github.repository }}/code-scanning/alerts/${{ steps.pick.outputs.number }}")

          RULE=$(echo "$ALERT"  | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['rule']['id'])")
          DESC=$(echo "$ALERT"  | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['rule']['description'])")
          FILE=$(echo "$ALERT"  | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['most_recent_instance']['location']['path'])")
          LINE=$(echo "$ALERT"  | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['most_recent_instance']['location']['start_line'])")
          MSG=$(echo "$ALERT"   | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['most_recent_instance']['message']['text'])")
          SEVERITY=$(echo "$ALERT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('rule',{}).get('severity','unknown'))")

          # Escape newlines for GITHUB_OUTPUT
          DESC_ESC=$(echo "$DESC" | tr '\n' ' ')
          MSG_ESC=$(echo "$MSG"   | tr '\n' ' ')

          echo "rule=$RULE"             >> "$GITHUB_OUTPUT"
          echo "description=$DESC_ESC" >> "$GITHUB_OUTPUT"
          echo "file=$FILE"             >> "$GITHUB_OUTPUT"
          echo "line=$LINE"             >> "$GITHUB_OUTPUT"
          echo "message=$MSG_ESC"       >> "$GITHUB_OUTPUT"
          echo "severity=$SEVERITY"     >> "$GITHUB_OUTPUT"
          echo "Alert #${{ steps.pick.outputs.number }}: [$SEVERITY] $RULE in $FILE:$LINE"

      # ── 4. Python setup ────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        if: steps.pick.outputs.found == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        if: steps.pick.outputs.found == 'true'
        run: |
          pip install openai requests
          pip install "PyJWT>=2.12.0" "cryptography>=46.0.6" --ignore-installed --quiet
          pip install -r requirements.txt --quiet || pip install -r requirements.txt --no-deps --quiet || true

      # ── 5. Create fix branch ───────────────────────────────────────────────
      - name: Create fix branch
        id: branch
        if: steps.alert.outputs.rule != ''
        run: |
          BRANCH="security-fix/alert-${{ steps.pick.outputs.number }}"
          git config user.email "claude-actions@github.com"
          git config user.name "Claude Actions [bot]"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # ── 6. Write alert context for the agent ──────────────────────────────
      - name: Write alert context
        if: steps.branch.outputs.branch != ''
        run: |
          cat > /tmp/note_content.txt <<'ALERTEOF'
          Source URL: CodeQL Security Alert #${{ steps.pick.outputs.number }}
          Fetched from: GitHub Security API

          ## Security Alert Details

          Alert Number : ${{ steps.pick.outputs.number }}
          Rule         : ${{ steps.alert.outputs.rule }}
          Severity     : ${{ steps.alert.outputs.severity }}
          Description  : ${{ steps.alert.outputs.description }}
          File         : ${{ steps.alert.outputs.file }}
          Line         : ${{ steps.alert.outputs.line }}
          Message      : ${{ steps.alert.outputs.message }}

          ## What to do

          Fix this CodeQL security alert in the file listed above.
          The fix should:
          1. Resolve the specific CWE / vulnerability identified by the rule.
          2. Preserve existing behaviour — do not break callers or tests.
          3. Follow the CLAUDE.md coding conventions (type hints, logging, Pydantic).
          4. Add or update a test for the fixed path when feasible.
          5. Update docs/changelog.md under ### Security.
          ALERTEOF

      # ── 7. Run NIM agent to fix the alert ─────────────────────────────────
      - name: Fix with NIM agent
        id: implement
        if: steps.branch.outputs.branch != ''
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          python3 .github/scripts/implement_agent.py \
            "https://github.com/${{ github.repository }}/security/code-scanning/alerts/${{ steps.pick.outputs.number }}" \
            "security-${{ steps.pick.outputs.number }}" \
            "Fix CodeQL ${{ steps.alert.outputs.severity }} alert [${{ steps.alert.outputs.rule }}] in ${{ steps.alert.outputs.file }}:${{ steps.alert.outputs.line }} — ${{ steps.alert.outputs.message }}" \
            2>&1 | tee /tmp/impl_output.txt

          if [ -f /tmp/impl_result.json ]; then
            SUCCESS=$(python3 -c "import json; print(json.load(open('/tmp/impl_result.json'))['success'])")
            echo "success=$SUCCESS" >> "$GITHUB_OUTPUT"
          else
            echo "success=False" >> "$GITHUB_OUTPUT"
          fi

      # ── 8. Run tests ───────────────────────────────────────────────────────
      - name: Run pytest
        id: tests
        if: steps.implement.outputs.success == 'True'
        run: |
          if pytest -x -q --tb=short 2>&1 | tee /tmp/test_output.txt; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 9. Commit and push ─────────────────────────────────────────────────
      - name: Commit and push
        id: commit
        if: steps.implement.outputs.success == 'True'
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No file changes — alert may already be resolved."
          else
            git commit -m "fix(security): resolve CodeQL alert #${{ steps.pick.outputs.number }} — ${{ steps.alert.outputs.rule }}"
            git push -u origin "${{ steps.branch.outputs.branch }}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 10. Create PR ──────────────────────────────────────────────────────
      - name: Create pull request
        id: pr
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUMMARY=$(python3 -c "
          import json
          try:
              d = json.load(open('/tmp/impl_result.json'))
              print(d.get('summary','(see diff)')[:400])
          except Exception:
              print('(see diff)')
          " 2>/dev/null || echo "(see diff)")

          TEST_STATUS="${{ steps.tests.outputs.passed == 'true' && '✅ All tests pass' || '⚠️ Some tests failed — review before merging' }}"

          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --title "fix(security): CodeQL alert #${{ steps.pick.outputs.number }} — ${{ steps.alert.outputs.rule }}" \
            --body "$(cat <<PRBODY
          ## Security Fix

          Resolves CodeQL security alert **#${{ steps.pick.outputs.number }}**.

          | Field | Value |
          |-------|-------|
          | **Rule** | \`${{ steps.alert.outputs.rule }}\` |
          | **Severity** | ${{ steps.alert.outputs.severity }} |
          | **File** | \`${{ steps.alert.outputs.file }}:${{ steps.alert.outputs.line }}\` |
          | **Finding** | ${{ steps.alert.outputs.message }} |

          ### What was changed
          $SUMMARY

          ### Tests
          $TEST_STATUS

          ---
          *Auto-generated by the fix-security-alerts workflow.*
          PRBODY
          )" \
            --base master \
            --head "${{ steps.branch.outputs.branch }}" \
            --label "security")

          PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "pr_url=$PR_URL"    >> "$GITHUB_OUTPUT"
          echo "Created PR #$PR_NUM — $PR_URL"

      # ── 11. Auto-merge if tests passed ─────────────────────────────────────
      - name: Merge PR
        if: >
          steps.pr.outputs.pr_number != '' &&
          steps.tests.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch \
            --admin \
            --subject "fix(security): resolve CodeQL alert #${{ steps.pick.outputs.number }} — ${{ steps.alert.outputs.rule }}"
          echo "PR merged."

      # ── 12. Dismiss alert after merge ──────────────────────────────────────
      - name: Dismiss alert
        if: steps.pr.outputs.pr_number != '' && steps.tests.outputs.passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            "/repos/${{ github.repository }}/code-scanning/alerts/${{ steps.pick.outputs.number }}" \
            -f state=dismissed \
            -f dismissed_reason=fixed \
            -f dismissed_comment="Fixed by automated security workflow via PR #${{ steps.pr.outputs.pr_number }}" \
            2>/dev/null || true

      # ── 13. Leave PR open if tests failed ──────────────────────────────────
      - name: Flag PR for review (tests failed)
        if: >
          steps.pr.outputs.pr_number != '' &&
          steps.tests.outputs.passed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ steps.pr.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --body "⚠️ Security fix needs human review — some tests failed. Please verify the fix and merge manually."
