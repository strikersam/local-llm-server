name: Changelog check

on:
  pull_request:
    branches: ["main", "master"]

jobs:
  changelog:
    name: Require changelog entry
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changelog update
        run: |
          # Skip if this is a chore/ci/docs/style/test-only PR
          # (detected by PR title prefix — requires PR title convention)
          PR_TITLE="${{ github.event.pull_request.title }}"
          case "$PR_TITLE" in
            chore:*|docs:*|style:*|ci:*|test:*|revert:*|build:*)
              echo "ℹ Exempt PR prefix detected ('$PR_TITLE') — changelog check skipped."
              exit 0
              ;;
          esac

          # Check if docs/changelog.md was modified in this PR
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep 'docs/changelog\.md' || true)

          if [ -z "$CHANGED" ]; then
            echo "::error::docs/changelog.md was not updated in this PR."
            echo ""
            echo "Every PR that changes code behaviour must update docs/changelog.md."
            echo "Add an entry under ## [Unreleased] following Keep a Changelog format."
            echo ""
            echo "If this is a chore/docs/style/ci/test-only PR, prefix the PR title:"
            echo "  chore: bump dependency X"
            echo "  test: add coverage for router"
            echo ""
            echo "See: .claude/skills/changelog-enforcer/SKILL.md"
            exit 1
          fi

          # Also verify the [Unreleased] section has actual content
          python3 - <<'EOF'
          import re, sys
          content = open("docs/changelog.md").read()
          m = re.search(r"## \[Unreleased\](.*?)(?=## \[|\Z)", content, re.DOTALL)
          if not m:
              print("::error::No [Unreleased] section found in docs/changelog.md")
              sys.exit(1)
          body = m.group(1).strip()
          if not body or body == "_(nothing pending)_":
              print("::error::[Unreleased] section in docs/changelog.md has no entries")
              sys.exit(1)
          print(f"✓ docs/changelog.md has {len(body.splitlines())} lines of unreleased content")
          EOF
