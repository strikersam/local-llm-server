name: OpenClaw Security Automation

on:
  schedule:
    - cron: '0 * * * *'  # Hourly
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/openclaw-security-automation.yml'
      - '.github/scripts/security_fix_agent.py'

permissions:
  contents: read
  issues: write
  vuln-alerts: read
  security-events: read

jobs:
  security-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install OpenClaw
        run: |
          npm install -g openclaw@latest
          openclaw --version

      - name: Install Python dependencies
        run: |
          pip install github3.py requests tqdm

      - name: Check for Dependabot alerts
        id: dependabot-check
        run: |
          echo "Checking for Dependabot alerts..."
          python .github/scripts/security_fix_agent.py --check-dependabot
          echo "dependabot_count=$DEPENDABOT_COUNT" >> $GITHUB_OUTPUT

      - name: Check for CodeQL alerts
        id: codeql-check
        run: |
          echo "Checking for CodeQL alerts..."
          python .github/scripts/security_fix_agent.py --check-codeql
          echo "codeql_count=$CODEQL_COUNT" >> $GITHUB_OUTPUT

      - name: Fix Dependabot alerts
        if: steps.dependabot-check.outputs.dependabot_count != '0'
        run: |
          echo "Fixing Dependabot alerts..."
          python .github/scripts/security_fix_agent.py --fix-dependabot

      - name: Fix CodeQL alerts
        if: steps.codeql-check.outputs.codeql_count != '0'
        run: |
          echo "Fixing CodeQL alerts..."
          python .github/scripts/security_fix_agent.py --fix-codeql

      - name: Get current timestamp
        id: timestamp
        run: echo "timestamp=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Create summary issue
        if: (steps.dependabot-check.outputs.dependabot_count != '0' || steps.codeql-check.outputs.codeql_count != '0')
        uses: actions/github-script@v7
        with:
          script: |
            const dependabotCount = parseInt("${{ steps.dependabot-check.outputs.dependabot_count }}") || 0;
            const codeqlCount = parseInt("${{ steps.codeql-check.outputs.codeql_count }}") || 0;
            
            if (dependabotCount > 0 || codeqlCount > 0) {
              const issueTitle = `🔧 OpenClaw Security Automation Report`;
              const issueBody = `
              ## Security Automation Summary
              
              The OpenClaw security automation workflow has completed.
              
              #### Findings:
              - Dependabot alerts: \`${dependabotCount}\`
              - CodeQL alerts: \`${codeqlCount}\`
              
              #### Actions Taken:
              - Automated fixes attempted for all detectable issues
              - Manual review may be required for complex fixes
              
              #### Workflow Details:
              - Workflow: OpenClaw Security Automation
              - Repository: \${{ github.repository }}
              - Commit: \${{ github.sha }}
              - Timestamp: ${steps.timestamp.outputs.timestamp}
              
              For more details, check the workflow run logs.
              `;
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['security', 'automation']
              });
            }
