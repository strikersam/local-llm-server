name: OpenClaw Security Automation

on:
  schedule:
    - cron: '0 * * * *' # Hourly
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/openclaw-security-automation.yml'
      - '.github/scripts/security_fix_agent.py'

permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write
  administration: read

