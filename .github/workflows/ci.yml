name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep -q 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    strategy:
      matrix:
        python-version: ["3.13"]
      fail-fast: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          find . -name "*.py" \
            -not -path "./.venv/*" \
            -not -path "./.git/*" \
            -exec python -m py_compile {} +
          echo "✓ Python syntax OK"

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            if nc -z localhost 27017; then
              echo "✓ MongoDB is reachable on localhost:27017"
              exit 0
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 2
          done
          echo "::error::MongoDB did not become reachable within 60s"
          exit 1

      - name: Run tests
        env:
          # Provide stub env vars so modules that read env at import time don't error
          API_KEYS: "ci-test-key"
          ADMIN_EMAIL: "admin@llmrelay.local"
          ADMIN_PASSWORD: "WikiAdmin2026!"
          SECRET_KEY: "ci-test-secret-do-not-use"
          OLLAMA_BASE: "http://localhost:11434"
          LANGFUSE_SECRET_KEY: ""
          LANGFUSE_PUBLIC_KEY: ""
          LANGFUSE_HOST: ""
          ROUTER_HEALTH_CHECK_ENABLED: "false"
          MONGO_URL: "mongodb://localhost:27017"
          DB_NAME: "llm_wiki_dashboard_ci"
        run: |
          pytest -x -v --tb=short

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: .pytest_cache/
          retention-days: 7

  lint:
    name: Lint check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: pip install -r requirements.txt
      - name: Check for hardcoded secrets
        run: |
          # Fail if any non-test .py file has a hardcoded SECRET_KEY assignment
          if grep -rn --include="*.py" \
            --exclude-dir=".venv" \
            --exclude-dir="tests" \
            'SECRET_KEY\s*=\s*["\x27][^"]+["\x27]' .; then
            echo "::error::Hardcoded SECRET_KEY found — use environment variables"
            exit 1
          fi
          echo "✓ No hardcoded secrets found"
