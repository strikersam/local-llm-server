version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# local-llm-server — Docker Compose
#
# Default stack (docker compose up):
#   ollama   — local LLM runtime
#   runtimes — 4 lightweight agent runtime wrappers (hermes, opencode, goose, aider)
#   proxy    — authenticated OpenAI/Anthropic-compatible proxy + web UI
#   mongo    — MongoDB for agent store & task persistence
#
# Optional profiles:
#   docker compose --profile tunnel up   → adds cloudflared public HTTPS URL
#   docker compose --profile ngrok up    → adds ngrok tunnel (requires NGROK_AUTHTOKEN)
#
# Quick start:
#   cp .env.example .env && $EDITOR .env   (set API_KEYS and ADMIN_SECRET)
#   docker compose up
#   open http://localhost:3000  (LLM Relay dashboard)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Ollama LLM runtime ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: llm-server-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5
    # Uncomment for NVIDIA GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── Agent Runtimes (lightweight OpenAI-compatible wrappers) ────────────────
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.runtime
      args:
        RUNTIME_NAME: hermes
    container_name: llm-server-hermes
    restart: unless-stopped
    ports:
      - "8002:8080"
    environment:
      - RUNTIME_NAME=hermes
      - OLLAMA_BASE=http://ollama:11434
      - DEFAULT_MODEL=qwen3-coder:30b
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      ollama:
        condition: service_healthy

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.runtime
      args:
        RUNTIME_NAME: opencode
    container_name: llm-server-opencode
    restart: unless-stopped
    ports:
      - "8003:8080"
    environment:
      - RUNTIME_NAME=opencode
      - OLLAMA_BASE=http://ollama:11434
      - DEFAULT_MODEL=qwen3-coder:30b
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      ollama:
        condition: service_healthy

  goose:
    build:
      context: .
      dockerfile: Dockerfile.runtime
      args:
        RUNTIME_NAME: goose
    container_name: llm-server-goose
    restart: unless-stopped
    ports:
      - "8004:8080"
    environment:
      - RUNTIME_NAME=goose
      - OLLAMA_BASE=http://ollama:11434
      - DEFAULT_MODEL=qwen3-coder:30b
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      ollama:
        condition: service_healthy

  aider:
    build:
      context: .
      dockerfile: Dockerfile.runtime
      args:
        RUNTIME_NAME: aider
    container_name: llm-server-aider
    restart: unless-stopped
    ports:
      - "8005:8080"
    environment:
      - RUNTIME_NAME=aider
      - OLLAMA_BASE=http://ollama:11434
      - DEFAULT_MODEL=qwen3-coder:30b
      - PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      ollama:
        condition: service_healthy

  # ── MongoDB (agent store & task persistence) ───────────────────────────────
  mongo:
    image: mongo:7
    container_name: llm-server-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Proxy (FastAPI + built web UI) ────────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-server-proxy
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OLLAMA_BASE=http://ollama:11434
      - MONGO_URL=mongodb://mongo:27017
      - REGISTER_RUNTIMES=1
      # Configure runtime adapters to use Docker containers
      - HERMES_BASE_URL=http://hermes:8080
      - OPENCODE_BASE_URL=http://opencode:8080
      - GOOSE_BASE_URL=http://goose:8080
      - AIDER_BASE_URL=http://aider:8080
    depends_on:
      ollama:
        condition: service_healthy
      mongo:
        condition: service_healthy
      hermes:
        condition: service_healthy
      opencode:
        condition: service_healthy
      goose:
        condition: service_healthy
      aider:
        condition: service_healthy

  # ── LLM Relay Dashboard (optional, profile: dashboard) ─────────────────────
  dashboard-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: llm-relay-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - FRONTEND_URL=http://localhost:3000
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      mongo:
        condition: service_started
      ollama:
        condition: service_healthy
    profiles:
      - dashboard

  dashboard-frontend:
    build:
      context: .
      dockerfile: Dockerfile.dashboard.frontend
      args:
        REACT_APP_BACKEND_URL: http://localhost:8001
    container_name: llm-relay-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - dashboard-backend
    profiles:
      - dashboard

  # ── Cloudflare Tunnel (free, no account needed for quick tunnels) ─────────
  # Provides a public HTTPS URL instantly. No NGROK_AUTHTOKEN needed for
  # quick tunnels. For a persistent subdomain, create a named tunnel:
  #   https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
  #
  # Usage: docker compose --profile tunnel up
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: llm-server-tunnel
    restart: unless-stopped
    command: tunnel --url http://proxy:8000
    depends_on:
      - proxy
    profiles:
      - tunnel

  # ── ngrok tunnel (alternative — requires free ngrok account) ──────────────
  # Get a token at https://dashboard.ngrok.com/get-started/your-authtoken
  # Set NGROK_AUTHTOKEN in .env. Optionally set NGROK_DOMAIN for a fixed URL.
  #
  # Usage: docker compose --profile ngrok up
  ngrok:
    image: ngrok/ngrok:latest
    container_name: llm-server-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "--log=stdout"
      - "proxy:8000"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - proxy
    profiles:
      - ngrok

volumes:
  ollama_data:
  mongo_data:
