version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: llm-wiki-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: llm-wiki-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 10s
      retries: 5

  ollama-init:
    image: curlimages/curl:latest
    container_name: llm-wiki-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      sh -c 'echo "Pulling llama3.2..."; curl -s http://ollama:11434/api/pull -d "{\"name\": \"llama3.2\"}" ; echo "Done."'

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: llm-wiki-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=llm_wiki_dashboard
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_PROVIDER=ollama
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: llm-wiki-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ngrok tunnel for public access
  ngrok:
    image: ngrok/ngrok:latest
    container_name: llm-wiki-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "--domain=${NGROK_DOMAIN}"
      - "frontend:80"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - frontend
    profiles:
      - public

  # Original proxy for Claude Code / Cursor / Aider compatibility
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-wiki-proxy
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - OLLAMA_BASE=http://ollama:11434
    depends_on:
      - ollama
    profiles:
      - full

volumes:
  mongo_data:
  ollama_data:
