services:
  - type: web
    name: local-llm-server
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # ── MongoDB Atlas ──────────────────────────────────────────────────────────
      # Create a free M0 cluster at https://cloud.mongodb.com and paste the URI here
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: llm_wiki_dashboard

      # ── JWT / Auth ─────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@llmrelay.local
      - key: ADMIN_PASSWORD
        sync: false

      # ── LLM Provider ──────────────────────────────────────────────────────────
      - key: LLM_PROVIDER
        value: ollama
      # URL of your Ollama instance (leave blank if not using local LLMs on Render)
      - key: OLLAMA_BASE_URL
        sync: false
      # Internal-agent Ollama endpoint (used by InternalAgentAdapter in-process)
      - key: OLLAMA_BASE
        sync: false

      # ── Provider fallback chain ────────────────────────────────────────────────
      - key: HF_TOKEN
        sync: false # HuggingFace free inference token
      - key: HF_BASE_URL
        value: "https://router.huggingface.co"
      - key: HF_MODEL_ID
        value: "Qwen/Qwen2.5-Coder-7B-Instruct"
      - key: DEEPSEEK_API_KEY
        sync: false # DeepSeek API key (free tier available)
      - key: DEEPSEEK_BASE_URL
        value: "https://api.deepseek.com"
      - key: ANTHROPIC_API_KEY
        sync: false # Anthropic Claude — last resort commercial fallback
      - key: ANTHROPIC_BASE_URL
        value: "https://api.anthropic.com"
      - key: ANTHROPIC_MODEL
        value: "claude-3-5-sonnet-latest"
      - key: OLLAMA_WINDOWS_SERVER
        sync: false # Windows machine running Ollama (optional)
      - key: PROVIDER_COOLDOWN_SECONDS
        value: "60"

      # ── Frontend ──────────────────────────────────────────────────────────────
      - key: FRONTEND_URL
        value: https://strikersam.github.io

      # ═══════════════════════════════════════════════════════════════════════════
      # AGENT RUNTIME CONFIGURATIONS
      # Set the *_BASE_URL keys in the Render dashboard to point to your deployed
      # runtime services (or leave blank to disable that adapter).
      # ═══════════════════════════════════════════════════════════════════════════

      # ── Runtime base URLs ─────────────────────────────────────────────────────
      - key: HERMES_BASE_URL
        sync: false # e.g. https://hermes.onrender.com
      - key: OPENCODE_BASE_URL
        sync: false # e.g. https://opencode.onrender.com
      - key: GOOSE_BASE_URL
        sync: false # e.g. https://goose.onrender.com
      - key: AIDER_BASE_URL
        sync: false # e.g. https://aider.onrender.com
      - key: OPENHANDS_BASE_URL
        sync: false # e.g. https://openhands.onrender.com

      # ── Runtime routing policy ────────────────────────────────────────────────
      - key: RUNTIME_NEVER_PAID
        value: "false"
      - key: RUNTIME_REQUIRE_APPROVAL
        value: "false"
      - key: RUNTIME_MAX_PAID_ESCALATIONS
        value: "0"
      - key: RUNTIME_DEFAULT
        value: "hermes"
      - key: RUNTIME_CODE_GENERATION
        value: "opencode"
      - key: RUNTIME_CODE_REVIEW
        value: "opencode"
      - key: RUNTIME_REPO_EDITING
        value: "opencode"
      - key: RUNTIME_GIT_OPS
        value: "aider"
      - key: RUNTIME_HEALTH_POLL_SEC
        value: "30"

      # ── OpenHands (experimental — requires Docker; disabled by default) ────────
      - key: OPENHANDS_ENABLED
        value: "false"

      # ── Adapter-specific settings ─────────────────────────────────────────────
      - key: HERMES_API_KEY
        sync: false
      - key: HERMES_TIMEOUT_SEC
        value: "300"
      - key: OPENCODE_MODEL
        value: "qwen3-coder:30b"
      - key: GOOSE_MODEL
        value: "qwen3-coder:14b"
      - key: GOOSE_PROFILE
        value: "default"
      - key: AIDER_MODEL
        value: "ollama/qwen3-coder:14b"
      - key: AIDER_NO_AUTO_COMMIT
        value: "false"
