services:
  - type: web
    name: local-llm-server
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      # ── MongoDB Atlas ──────────────────────────────────────────────────────────
      # Create a free M0 cluster at https://cloud.mongodb.com and paste the URI here
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: llm_wiki_dashboard

      # ── JWT / Auth ─────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@llmrelay.local
      - key: ADMIN_PASSWORD
        sync: false

      # ── LLM Provider ──────────────────────────────────────────────────────────
      - key: LLM_PROVIDER
        value: ollama
      # URL of your Ollama instance (leave blank if not using local LLMs on Render)
      - key: OLLAMA_BASE_URL
        sync: false
      # Internal-agent Ollama endpoint (used by InternalAgentAdapter in-process)
      - key: OLLAMA_BASE
        sync: false

      # ── Frontend ──────────────────────────────────────────────────────────────
      - key: FRONTEND_URL
        value: https://strikersam.github.io

      # ═══════════════════════════════════════════════════════════════════════════
      # AGENT RUNTIME CONFIGURATIONS
      # Set the *_BASE_URL keys in the Render dashboard to point to your deployed
      # runtime services (or leave blank to disable that adapter).
      # ═══════════════════════════════════════════════════════════════════════════

      # ── Runtime base URLs ─────────────────────────────────────────────────────
      - key: HERMES_BASE_URL
        sync: false        # e.g. https://hermes.onrender.com
      - key: OPENCODE_BASE_URL
        sync: false        # e.g. https://opencode.onrender.com
      - key: GOOSE_BASE_URL
        sync: false        # e.g. https://goose.onrender.com
      - key: AIDER_BASE_URL
        sync: false        # e.g. https://aider.onrender.com
      - key: OPENHANDS_BASE_URL
        sync: false        # e.g. https://openhands.onrender.com

      # ── Runtime routing policy ────────────────────────────────────────────────
      - key: RUNTIME_NEVER_PAID
        value: "true"
      - key: RUNTIME_MAX_PAID_ESCALATIONS
        value: "0"
      - key: RUNTIME_DEFAULT
        value: "hermes"
      - key: RUNTIME_CODE_GENERATION
        value: "opencode"
      - key: RUNTIME_CODE_REVIEW
        value: "opencode"
      - key: RUNTIME_REPO_EDITING
        value: "opencode"
      - key: RUNTIME_GIT_OPS
        value: "aider"
      - key: RUNTIME_HEALTH_POLL_SEC
        value: "30"

      # ── OpenHands (experimental — requires Docker; disabled by default) ────────
      - key: OPENHANDS_ENABLED
        value: "false"

      # ── Adapter-specific settings ─────────────────────────────────────────────
      - key: HERMES_API_KEY
        sync: false
      - key: HERMES_TIMEOUT_SEC
        value: "300"
      - key: OPENCODE_MODEL
        value: "qwen3-coder:30b"
      - key: GOOSE_MODEL
        value: "qwen3-coder:14b"
      - key: GOOSE_PROFILE
        value: "default"
      - key: AIDER_MODEL
        value: "ollama/qwen3-coder:14b"
      - key: AIDER_NO_AUTO_COMMIT
        value: "false"
