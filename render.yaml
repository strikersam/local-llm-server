services:
  - type: web
    name: local-llm-server
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: free
    healthCheckPath: /api/health-test
    envVars:
      # MongoDB Atlas connection string — required
      # Create a free M0 cluster at https://cloud.mongodb.com and paste the URI here
      - key: MONGO_URL
        sync: false

      - key: DB_NAME
        value: llm_wiki_dashboard

      # Auto-generated JWT secret for session tokens
      - key: JWT_SECRET
        generateValue: true

      # Admin login credentials for the dashboard
      - key: ADMIN_EMAIL
        value: admin@llmrelay.local
      - key: ADMIN_PASSWORD
        sync: false

      # LLM provider: "ollama" or "openai-compatible"
      - key: LLM_PROVIDER
        value: ollama

      # URL of your Ollama instance (leave blank if not using local LLMs)
      - key: OLLAMA_BASE_URL
        sync: false

      # Allow requests from the GitHub Pages frontend
      - key: FRONTEND_URL
        value: https://strikersam.github.io
